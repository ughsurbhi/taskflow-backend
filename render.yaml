services:
  - type: web
    name: taskflow-backend
    runtime: node
    buildCommand: npm install && node node_modules/prisma/build/index.js generate && node node_modules/prisma/build/index.js db push --accept-data-loss
    startCommand: node node_modules/ts-node/dist/bin.js --transpile-only src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://taskflow-frontend.vercel.app

databases:
  - name: taskflow-db
    plan: free
